<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Заявка в техпідтримку (Варіант 9)</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="app.js" defer></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Заявка в техпідтримку (Варіант №9)</h1>  
        </header>

        <nav class="main-nav">
            <button class="nav-btn active" data-target="tickets-view">Тікети</button>
            <button class="nav-btn" data-target="users-view">Користувачі</button>
            <button class="nav-btn" data-target="statuses-view">Статуси</button>
        </nav>

        <main>
            <div id="tickets-view" class="view-section active">
                <section id="create-section">
                    <h2>Створити тікет</h2>
                    <form id="ticketForm">
                        <div class="field">
                            <label for="authorSelect">Автор (Користувач)</label>
                            <select id="authorSelect"><option value="">Завантаження...</option></select>
                            <p class="error-text" id="authorError"></p>
                        </div>

                        <div class="field">
                            <label for="subjectInput">Тема</label>
                            <input id="subjectInput" type="text" placeholder="Короткий опис проблеми" />
                            <p class="error-text" id="subjectError"></p>
                        </div>

                        <div class="field">
                            <label for="statusSelect">Статус</label>
                            <select id="statusSelect"><option value="">Завантаження...</option></select>
                            <p class="error-text" id="statusError"></p>
                        </div>

                        <div class="field">
                            <label for="prioritySelect">Пріоритет</label>
                            <select id="prioritySelect">
                                <option value="">Оберіть пріоритет</option>
                                <option value="Low">Низький</option>
                                <option value="Medium">Середній</option>
                                <option value="High">Високий</option>
                            </select>
                            <p class="error-text" id="priorityError"></p>
                        </div>

                        <div class="field">
                            <label for="messageInput">Повідомлення</label>
                            <textarea id="messageInput" rows="4" placeholder="Опишіть проблему детально..."></textarea>
                            <p class="error-text" id="messageError"></p>
                        </div>

                        <div class="buttons">
                            <button type="submit" id="submitBtn">Додати</button>
                            <button type="button" id="resetBtn">Очистити</button>
                        </div>
                    </form>
                </section>

                <section id="controls-section">
                    <div class="toolbar">
                        <input type="text" id="searchInput" placeholder="Пошук за темою..." />
                        <select id="filterStatus">
                            <option value="">Усі статуси</option>
                        </select>
                        <select id="sortPriority">
                            <option value="">Без сортування</option>
                            <option value="asc">Пріоритет (Низький -> Високий)</option>
                            <option value="desc">Пріоритет (Високий -> Низький)</option>
                        </select>
                    </div>
                </section>

                <section id="list-section">
                    <h2>Список тікетів</h2>
                    <table id="ticketsTable">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Автор</th>
                                <th>Тема</th>
                                <th>Статус</th>
                                <th>Пріоритет</th>
                                <th>Дії</th>
                            </tr>
                        </thead>
                        <tbody id="ticketsTableBody"></tbody>
                    </table>
                </section>
            </div>

            <div id="users-view" class="view-section">
                <section>
                    <h2>Додати користувача</h2>
                    <form id="userForm" class="inline-form">
                        <input type="text" id="userNameInput" placeholder="Ім'я" required />
                        <input type="email" id="userEmailInput" placeholder="Email" required />
                        <select id="userRoleInput" required>
                            <option value="Client">Клієнт</option>
                            <option value="Support">Підтримка</option>
                            <option value="Admin">Адмін</option>
                        </select>
                        <button type="submit">Додати</button>
                    </form>

                    <h2>Список користувачів</h2>
                    <table>
                        <thead><tr><th>Ім'я</th><th>Email</th><th>Роль</th><th>Дії</th></tr></thead>
                        <tbody id="usersTableBody"></tbody>
                    </table>
                </section>
            </div>

            <div id="statuses-view" class="view-section">
                <section>
                    <h2>Додати статус</h2>
                    <form id="statusForm" class="inline-form">
                        <input type="text" id="statusNameInput" placeholder="Назва статусу" required />
                        <input type="color" id="statusColorInput" value="#b96565" title="Колір статусу" />
                        <button type="submit">Додати</button>
                    </form>

                    <h2>Довідник статусів</h2>
                    <table>
                        <thead><tr><th>Назва</th><th>Колір</th><th>Дії</th></tr></thead>
                        <tbody id="statusesTableBody"></tbody>
                    </table>
                </section>
            </div>

            <div id="messages-view" class="view-section">
                <section>
                    <button id="backToTicketsBtn" style="margin-bottom: 12px;">&larr; Назад до тікетів</button>
                    <h2 id="chatTicketSubject">Тема тікета</h2>
                    
                    <div id="messagesContainer" class="messages-container">
                        </div>

                    <form id="messageForm" style="margin-top: 16px;">
                        <div class="field">
                            <label>Автор повідомлення</label>
                            <select id="messageAuthorSelect" required></select>
                        </div>
                        <div class="field">
                            <textarea id="newMessageText" rows="3" placeholder="Ваша відповідь..." required></textarea>
                        </div>
                        <button type="submit">Відправити коментар</button>
                    </form>
                </section>
            </div>

        </main>
    </div>
</body>
</html>
